<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Most Basic Web Map</title>
    
    <!-- Leaflet CSS stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style></style>
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header">
        <h1>A Mostly Basic Web Map</h1>
        <h3>by: Your Name Here</h3>
    </div>
    <div id="map" style="width: 600px; height: 400px;"></div>
    
    <!-- Leaflet JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on UMD campus, and set the zoom level
        const map = L.map('map').setView([46.78355, -92.10594], 13);

        // Add OPNVKarte tiles
        var OPNVKarte = L.tileLayer('https://tileserver.memomaps.de/tilegen/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: 'Map <a href="https://memomaps.de/">memomaps.de</a> <a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        //var OpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
	    //maxZoom: 17,
	    //attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)'
        //}).addTo(map);

        // Add a marker for Enger Park
        const markerEnger = L.marker([46.775750, -92.124361]).addTo(map);
        markerEnger.bindPopup("<b>Enger Park</b><br>Amazing views! It was dedicated by Norwegian royalty!").openPopup();

        // Add a marker for The Portland Malt Shoppe
        const markerMalt = L.marker([46.793139, -92.089556]).addTo(map);
        markerMalt.bindPopup("<b>The Portland Malt Shoppe</b><br>Best malts in town! It was formerly the Northwestern Oil company gas station.").openPopup();

        // Add a marker for Park Point Beach
        const markerParkPoint = L.marker([46.771778, -92.088000]).addTo(map);
        markerParkPoint.bindPopup("<b>Park Point Beach</b><br>The world's longest freshwater sandbar!").openPopup();
    </script>
</body>
</html>
